name: Deploy Vidyanvesha Form Server

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/vidyanvesha_form_server:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Stop existing containers first (before cleanup)
            echo "Stopping existing containers..."
            cd ~/vidyanvesha_form_server 2>/dev/null || true
            sudo docker compose down 2>/dev/null || sudo docker-compose down 2>/dev/null || true

            # 2. CLEANUP (safer approach)
            echo "Running disk cleanup..."
            sudo docker system prune -f --filter "until=24h"
            sudo docker image prune -af --filter "until=24h"

            # 3. Create project directory
            mkdir -p ~/vidyanvesha_form_server/config
            cd ~/vidyanvesha_form_server

            # 4. Create the .env file
            echo "Creating .env file..."
            cat <<EOF > .env
            SECRET_KEY=${{ secrets.DJANGO_SERVER_SECRETS }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.VPS_IP }},localhost,127.0.0.1,api.echotales.fun
            # Note: your settings.py doesn't currently use these DB variables, it has them hardcoded.
            DB_ENGINE=django.db.backends.postgresql
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=ec2-65-1-133-192.ap-south-1.compute.amazonaws.com
            DB_PORT=5432
            EOF

            # 5. Create firebase credentials file
            # You must add FIREBASE_SERVICE_ACCOUNT_JSON as a GitHub Repository Secret
            echo "Creating firebase_service_account.json..."
            cat <<'EOF' > config/firebase_service_account.json
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            EOF

            # 6. Create docker-compose.yml (v2 format)
            echo "Creating docker-compose.yml..."
            cat <<'EOF' > docker-compose.yml
            version: '3.8'
            
            services:
              web:
                image: ${{ secrets.DOCKER_HUB_USERNAME }}/vidyanvesha_form_server:latest
                container_name: vidyanvesha_form_web
                restart: always
                ports:
                  - "8002:8000"  # Mapping to 8002 to avoid conflicting with core on 8001
                env_file:
                  - .env
                volumes:
                  - ./config/firebase_service_account.json:/app/config/firebase_service_account.json:ro
                extra_hosts:
                  - "host.docker.internal:host-gateway"
            EOF

            # 7. Deploy using Docker Compose v2
            echo "Pulling latest image..."
            sudo docker compose pull || sudo docker-compose pull

            echo "Starting containers..."
            sudo docker compose up -d || sudo docker-compose up -d

            # 8. Wait for container to be ready
            echo "Waiting for container to be ready..."
            sleep 5

            # 9. Post-Deployment Tasks
            echo "Running Migrations..."
            sudo docker compose exec -T web python manage.py migrate || sudo docker-compose exec -T web python manage.py migrate

            echo "Collecting Static Files..."
            sudo docker compose exec -T web python manage.py collectstatic --noinput || sudo docker-compose exec -T web python manage.py collectstatic --noinput